name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: go golangci-lint
          add_shims_to_path: true
          cache_key: "mise-v1-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-ci-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-ci-${{ runner.os }}-
            go-${{ runner.os }}-

      - name: Check go.mod tidy
        run: mise run tidy:check

      - name: Vet
        run: mise run vet

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build

  audit:
    name: Audit
    runs-on: ubuntu-latest
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_ENV: "ci"
      MISE_LOCKED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: go
          add_shims_to_path: true
          cache_key: "mise-v1-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-audit-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-audit-${{ runner.os }}-
            go-${{ runner.os }}-

      - name: Verify dependencies
        run: mise run mod:verify

      - name: Run govulncheck
        run: mise run govulncheck

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_LOCKED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: node pnpm
          add_shims_to_path: true
          cache_key: "mise-v1-{{platform}}-{{install_args_hash}}-{{file_hash}}"

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "${GITHUB_OUTPUT}"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('docs/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build
        run: mise run docs:build
