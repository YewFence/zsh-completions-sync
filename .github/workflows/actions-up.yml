name: GitHub Actions Updates

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      update:
        description: Automatically update and commit GitHub Actions versions
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  update:
    name: Update GitHub Actions
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'workflow_dispatch' && inputs.update)
    permissions:
      contents: write
      pull-requests: read
    env:
      MISE_LOCKED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.ACTIONS_UPDATE_TOKEN || github.token }}

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update action versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run action:update:all

      - name: Commit action updates
        env:
          ACTIONS_UPDATE_TOKEN: ${{ secrets.ACTIONS_UPDATE_TOKEN }}
        run: |
          if git diff --quiet -- .github/workflows; then
            echo "No GitHub Actions updates were found"
            exit 0
          fi

          if [[ -z "${ACTIONS_UPDATE_TOKEN}" ]]; then
            echo "::error::GitHub Actions updates were found, but ACTIONS_UPDATE_TOKEN is not configured, so .github/workflows changes cannot be pushed automatically. Configure a token with workflow permission, or run mise run action:update:all locally and commit the changes manually."
            git diff --name-only -- .github/workflows
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows
          git commit -m "chore: update GitHub Actions versions"
          git push

  check:
    name: Check GitHub Actions
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) || (github.event_name == 'workflow_dispatch' && !inputs.update)
    env:
      MISE_LOCKED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check action updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mise run action:update:all

          if git diff --quiet -- .github/workflows; then
            echo "GitHub Actions are up to date" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          {
            echo "## GitHub Actions Update Check"
            echo
            echo "Updatable GitHub Actions were found. Run \`mise run action:update:all\` locally and commit the changes."
            echo
            echo '```diff'
            git diff -- .github/workflows
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          git diff --name-only -- .github/workflows
          exit 1
