[settings]
lockfile = true

[tools]
# https://go.dev/
go = "1"
# https://nodejs.org/
node = "26"
# https://github.com/azat-io/actions-up
"npm:actions-up" = "1"
# https://github.com/paulhatch/semantic-version
"npm:@semanticversion/cli" = "latest"
# https://pnpm.io/
pnpm = "11"
# https://golangci-lint.run/
golangci-lint = "2"

[env]

[env._]
path = ["./bin", "${GOBIN:-}"]

[tasks.tidy]
description = "Tidy Go module dependencies"
run = "go mod tidy"

[tasks.'tidy:check']
description = "Check whether Go module dependencies are tidy"
run = "go mod tidy && git diff --exit-code go.mod go.sum"

[tasks.'mod:verify']
description = "Verify Go module dependencies"
run = "go mod verify"

[tasks.update]
description = "Update Go dependencies and tidy modules"
run = "go get -u ./... && go mod tidy"

[tasks.test]
description = "Run Go tests"
run = "go test -v ./..."

[tasks.fmt]
description = "Check Go code formatting"
raw = true
run = "golangci-lint fmt -E gofmt --diff"

[tasks.vet]
description = "Run Go static checks"
raw = true
run = "go vet ./..."

[tasks.lint]
description = "Run Go lint checks"
raw = true
run = "golangci-lint run"

[tasks.check]
description = "Run Go formatting checks, static checks, build, and lint"
run = [
  { task = "fmt" },
  { task = "vet" },
  { task = "build" },
  { task = "lint" },
]

[tasks.cli]
description = "Run the CLI"
run = "go run ./cmd/zcs"

[tasks.'cli:install']
description = "Install the CLI into the local Go bin directory"
run = 'go install -trimpath -ldflags="-X main.version=${BUILD_VERSION:-dev}" ./cmd/zcs'

[tasks.build]
description = "Build the CLI executable"
run = 'go build -trimpath -ldflags="-s -w -X main.version=${BUILD_VERSION:-dev}" -o "${BUILD_OUTPUT_DIR:-bin}/" ./cmd/zcs'

[tasks.'action:update']
description = "Interactively update GitHub Action versions and pin to commit hashes by default"
run = "actions-up"

[tasks.'action:update:all']
description = "Automatically update all GitHub Action versions and pin to commit hashes by default"
run = "actions-up --yes"

[tasks.'docs:install']
description = "Install documentation site dependencies"
dir = "docs"
run = "pnpm install"

[tasks.'cli:docs']
description = "Generate CLI reference documentation"
run = "go run ./cmd/zcs-docs"

[tasks.'docs:dev']
description = "Start the VitePress documentation site"
depends = ["cli:docs", "docs:install"]
dir = "docs"
run = "pnpm dev"

[tasks.'docs:build']
description = "Build the VitePress documentation site"
depends = ["cli:docs", "docs:install"]
dir = "docs"
run = "pnpm build"

[tasks.'docs:preview']
description = "Preview the VitePress documentation site"
depends = ["docs:install"]
dir = "docs"
run = "pnpm preview"
